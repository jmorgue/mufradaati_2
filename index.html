async function sbFetch(path,opts={}){
  const res=await fetch(`${SB_URL}/rest/v1${path}`,{...opts,headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":opts.prefer||"return=representation",...(opts.headers||{})}});
  const text=await res.text();
  const body=text?JSON.parse(text):null;
  if(!res.ok)throw new Error((body&&(body.message||body.details))||res.statusText);

}

const sbUpsert=(p,b)=>sbFetch(p,{method:"POST",body:JSON.stringify(b),prefer:"resolution=merge-duplicates,return=minimal"});

async function hashPin(pin){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

const SEEDED_WORDS=[];

const SU=(()=>{const s=new Set();return SEEDED_WORDS.filter(w=>{if(s.has(w.arabic))return false;s.add(w.arabic);return true;});})();
const WT=["Noun","Verb","Adjective","Adverb","Phrase","Preposition","Conjunction","Other"];
const DL=["MSA","Darija","Shaami","Egyptian","Gulf","Other"];
const DN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const LV=[
  {id:"L1",l:"Level 1",s:"Every Day",c:"#C04848",r:true},
  {id:"L1Q",l:"L1 Queue",s:"Holding",c:"#A03838",r:false},
  {id:"L2H",l:"L2 Queue",s:"Holding",c:"#C06020",r:false},
  {id:"L2Q",l:"Level 2",s:"Every Other Day",c:"#B85C28",r:true},
  {id:"L3Q",l:"L3 Queue",s:"Waiting for L3",c:"#957030",r:false},
  {id:"L3",l:"Level 3",s:"Sun & Wed",c:"#C49E3C",r:true},
  {id:"L4Q",l:"L4 Queue",s:"Waiting for L4",c:"#2A5A90",r:false},
  {id:"L4",l:"Level 4",s:"Sundays",c:"#3A7BC8",r:true},
  {id:"L5H",l:"L5 Queue",s:"Holding",c:"#7B3C98",r:false},
  {id:"L5Q",l:"Level 5",s:"Every Other Sun",c:"#9B59B6",r:true},
  {id:"M",l:"Mastered",s:"Retired",c:"#3A9864",r:false}
];
const VI=new Set(LV.map(l=>l.id));
const RO=["L5Q","L4","L3","L2Q","L1"];
const PR={L1:"L2H",L2Q:"L3Q",L3:"L4Q",L4:"L5H",L5Q:"M"};
const DE={L1:"L1",L2Q:"L1Q",L3:"L2Q",L4:"L3Q",L5Q:"L4Q"};
// ── DEDUP ──
// Level order from lowest to highest
const LEVEL_ORDER = ["L1Q","L1","L2H","L2Q","L3Q","L3","L4Q","L4","L5H","L5Q","M"];
function levelRank(id){return LEVEL_ORDER.indexOf(id);}

function deduplicateWords(){
  // Group user words by normalized arabic (tashkeel-insensitive, ignores plural/conjugation suffix)
  const seen = {}; // normArabic -> [word, ...]
  uw.forEach(w=>{
    const key=normArabic(w.arabic);
    if(!key)return;
    if(!seen[key])seen[key]=[];
    seen[key].push(w);
  });
  let changed=false;
  const toDeleteIds=[];
  Object.values(seen).forEach(group=>{
    if(group.length<=1)return;
    // Keep the one at the highest level; if tie, keep the most recently created (likely the user's latest edit)
    group.sort((a,b)=>{
      const la=prog[a.id]?.leitnerLevel||a.leitnerLevel||"L1Q";
      const lb=prog[b.id]?.leitnerLevel||b.leitnerLevel||"L1Q";
      const r=levelRank(lb)-levelRank(la);
      if(r!==0)return r;
      return (b.createdAt||0)-(a.createdAt||0);
    });
    const toDelete=group.slice(1);
    toDelete.forEach(w=>{
      uw=uw.filter(x=>x.id!==w.id);
      delete prog[w.id];
      toDeleteIds.push(w.id);
    });
    changed=true;
  });
  if(changed){
    saveUW();
    // Queue server deletes for the dropped duplicates so they don't come back next login
    toDeleteIds.forEach(queuePendingDelete);
    flushPendingDeletes();
    scheduleSync();
  }
}



function rgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}
function nrf(id){
  const now=new Date();now.setHours(0,0,0,0);const D=86400000;
  if(id==="L1"||id==="L1Q"||id==="L2H")return now.getTime()+D;
  if(id==="L2Q")return now.getTime()+2*D;
  if(id==="L3Q"||id==="L3"){for(let i=1;i<=7;i++){const nd=(now.getDay()+i)%7;if(nd===0||nd===3)return now.getTime()+i*D;}}
  if(id==="L4Q"||id==="L4"){const d=now.getDay();return now.getTime()+(d===0?7:7-d)*D;}
  if(id==="L5H")return now.getTime()+7*D;
  if(id==="L5Q")return now.getTime()+14*D;
  return null;
}
// Manual promotion respects per-card spacing for L3/L4/L5 — the next review
// can't be sooner than the level's interval after the card's last actual review.
// L1/L2 are immediately due (short cadence, user wants no extra wait).
// lastReviewedAt: timestamp of the card's last actual review (queued_at).
function promotedNextReview(toLevel, lastReviewedAt){
  if(toLevel==="L1"||toLevel==="L2Q")return Date.now();
  const D=86400000;
  const intervals={L3:3,L4:7,L5Q:14};
  const minInterval=intervals[toLevel];
  if(!minInterval)return nrf(toLevel)||Date.now();
  const today=new Date();today.setHours(0,0,0,0);
  const lastDay=lastReviewedAt?new Date(lastReviewedAt):new Date();
  lastDay.setHours(0,0,0,0);
  const earliest=Math.max(lastDay.getTime()+minInterval*D,today.getTime());
  // Walk forward from `earliest` to the first valid scheduled day for this level
  for(let i=0;i<21;i++){
    const cand=new Date(earliest+i*D);
    const dow=cand.getDay();
    if(toLevel==="L3"&&(dow===0||dow===3))return cand.getTime();
    if((toLevel==="L4"||toLevel==="L5Q")&&dow===0)return cand.getTime();
  }
  return earliest;
}
const sid=a=>"seed--"+a.split("").map(c=>c.charCodeAt(0).toString(16)).join("");
const lvi=id=>LV.find(l=>l.id===id)||LV[0];
const isDue=w=>{const lv=lvi(w.leitnerLevel);return!!lv.r&&w.nextReview<=Date.now();};
function uid(){return`user-${Date.now()}-${Math.random().toString(36).slice(2,5)}`;}
function gLS(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// State
let CU=null; // current user {id,username}
let prog={},uw=[],wt=60,view="auth",al="L1",df="All",el=new Set(["L1"]);
let rq=[],ri=0,rd="en-ar",rr=[],fl=false,sd=[];
let ir=null,syncing=false,pendingSync=null,pendingResync=false;
let authTab="login";

// Date-grouped promote panel state
let promoteOpenQueue=null;          // which queue's panel is currently expanded in Levels view
let promoteSelectedDates=new Set(); // YYYY-MM-DD strings currently checked

// Build a local-time YYYY-MM-DD key from a queued-at timestamp (ms or null)
function queueDateKey(ts){
  if(!ts)return "undated";
  const d=new Date(ts);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
function queueDateLabel(key){
  if(key==="undated")return "Undated";
  const [y,m,d]=key.split("-").map(Number);
  const dt=new Date(y,m-1,d);
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((today.getTime()-dt.getTime())/86400000);
  const base=dt.toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"});
  if(diff===0)return base+" (today)";
  if(diff===1)return base+" (yesterday)";
  if(diff>1)return base+` (${diff} days ago)`;
  return base;
}
function groupQueueByDate(queueId){
  const groups={};
  bw().filter(w=>w.leitnerLevel===queueId).forEach(w=>{
    const k=queueDateKey(prog[w.id]?.queuedAt);
    (groups[k]=groups[k]||[]).push(w);
  });
  return groups;
}

// Auth helpers
async function registerUser(username,pin){
  const pinHash=await hashPin(pin);
  const existing=await sbGet(`/users?username=eq.${encodeURIComponent(username)}&select=id`);
  if(existing&&existing.length)return{ok:false,error:"Username already taken."};
  try{const rows=await sbPost("/users",{username,pin_hash:pinHash});return{ok:true,user:{id:rows[0].id,username:rows[0].username}};}
  catch(e){return{ok:false,error:e.message};}
}
async function loginUser(username,pin){
  const pinHash=await hashPin(pin);
  const rows=await sbGet(`/users?username=eq.${encodeURIComponent(username)}&select=id,username,pin_hash,api_key`);
  if(!rows||!rows.length)return{ok:false,error:"Username not found."};
  if(rows[0].pin_hash!==pinHash)return{ok:false,error:"Incorrect PIN."};
  return{ok:true,user:{id:rows[0].id,username:rows[0].username,api_key:rows[0].api_key||""}};
}

// Progress DB
async function loadProgressFromDB(){
  if(!CU)return;
  try{
    // Load user-added words from Supabase
    const wordRows=await sbGet(`/user_words?user_id=eq.${CU.id}&select=word_id,arabic,english,example,word_type,dialect,created_at`);
    uw=(wordRows||[]).map(r=>({id:r.word_id,arabic:r.arabic,english:r.english,example:r.example||"",wordType:r.word_type,dialect:r.dialect,createdAt:new Date(r.created_at).getTime()}));
    saveUW();
    // Load progress
    const rows=await sbGet(`/progress?user_id=eq.${CU.id}&select=word_id,leitner_level,next_review,queued_at,bonus_reviewed_at,bonus_correct,bonus_wrong`);
    (rows||[]).forEach(r=>{if(VI.has(r.leitner_level))prog[r.word_id]={
      leitnerLevel:r.leitner_level,
      nextReview:r.next_review,
      queuedAt:r.queued_at?new Date(r.queued_at).getTime():null,
      bonusReviewedAt:r.bonus_reviewed_at?new Date(r.bonus_reviewed_at).getTime():null,
      bonusCorrect:r.bonus_correct||0,
      bonusWrong:r.bonus_wrong||0
    };});
  }catch(e){console.warn("DB load failed",e);}
}
async function saveProgressToDB(){
  if(!CU)return;
  if(syncing){pendingResync=true;return;}
  syncing=true;setSyncDot(true);
  try{
    // Save user-added words
    if(uw.length){
      const wordRows=uw.map(w=>({user_id:CU.id,word_id:w.id,arabic:w.arabic,english:w.english,example:w.example||"",word_type:w.wordType||"Noun",dialect:w.dialect||"MSA",created_at:w.createdAt?new Date(w.createdAt).toISOString():new Date().toISOString()}));
      for(let i=0;i<wordRows.length;i+=100)await sbUpsert("/user_words?on_conflict=user_id,word_id",wordRows.slice(i,i+100));
    }
    // Save progress
    const rows=Object.entries(prog).map(([word_id,v])=>({
      user_id:CU.id, word_id,
      leitner_level:v.leitnerLevel,
      next_review:v.nextReview,
      queued_at:v.queuedAt?new Date(v.queuedAt).toISOString():null,
      bonus_reviewed_at:v.bonusReviewedAt?new Date(v.bonusReviewedAt).toISOString():null,
      bonus_correct:v.bonusCorrect||0,
      bonus_wrong:v.bonusWrong||0,
      updated_at:new Date().toISOString()
    }));
    for(let i=0;i<rows.length;i+=100)await sbUpsert("/progress?on_conflict=user_id,word_id",rows.slice(i,i+100));
  }catch(e){console.warn("Sync failed",e);}
  syncing=false;setSyncDot(false);
  if(pendingResync){pendingResync=false;saveProgressToDB();}
}
function scheduleSync(){clearTimeout(pendingSync);pendingSync=setTimeout(()=>saveProgressToDB(),2000);}
function setSyncDot(on){
  const d=document.getElementById("sync-dot");if(!d)return;
  if(!navigator.onLine){d.className="sync-dot offline";d.title="Offline — changes will sync when you reconnect";return;}
  d.className="sync-dot"+(on?" syncing":"");
  d.title=on?"Syncing…":"Synced";
}

// User words
function uwKey(){return CU?`mufradat-uw-${CU.username}`:"mufradat-uw";}
function loadUW(){uw=gLS(uwKey())||[];}
function saveUW(){sLS(uwKey(),uw);}

// Arabic normalization for duplicate detection (strip tashkeel + take first part of "x · y")
function normArabic(s){return(s||"").split(" · ")[0].trim().replace(/[\u064B-\u065F\u0670]/g,"");}

// Pending-delete queue — survives offline / failed syncs so deletes actually stick
function pdKey(){return CU?`mufradat-pending-deletes-${CU.username}`:"mufradat-pending-deletes";}
function getPendingDeletes(){return gLS(pdKey())||[];}
function setPendingDeletes(arr){sLS(pdKey(),arr);}
function queuePendingDelete(id){const cur=getPendingDeletes();if(!cur.includes(id)){cur.push(id);setPendingDeletes(cur);}}
async function flushPendingDeletes(){
  if(!CU)return;
  const ids=getPendingDeletes();
  if(!ids.length)return;
  const remaining=[];
  for(const id of ids){
    try{
      await sbFetch(`/user_words?user_id=eq.${CU.id}&word_id=eq.${encodeURIComponent(id)}`,{method:"DELETE",prefer:"return=minimal"});
      await sbFetch(`/progress?user_id=eq.${CU.id}&word_id=eq.${encodeURIComponent(id)}`,{method:"DELETE",prefer:"return=minimal"});
    }catch(e){console.warn("Pending delete failed for",id,e);remaining.push(id);}
  }
  setPendingDeletes(remaining);
}
async function deleteWordCompletely(id){
  // Local
  uw=uw.filter(w=>w.id!==id);
  delete prog[id];
  saveUW();
  // Queue + attempt server delete now
  queuePendingDelete(id);
  await flushPendingDeletes();
}

// Words
function bw(){
  const s=SU.map(w=>{const id=sid(w.arabic);const p=prog[id]||{};return{...w,id,createdAt:0,leitnerLevel:p.leitnerLevel||"L1",nextReview:p.nextReview||Date.now()};});
  const sa=new Set(s.map(w=>w.arabic));
  const u=uw.filter(w=>!sa.has(w.arabic)).map(w=>{const p=prog[w.id]||{};return{...w,leitnerLevel:p.leitnerLevel||w.leitnerLevel||"L1",nextReview:p.nextReview||w.nextReview||Date.now()};});
  return[...s,...u];
}
function cam(){
  // Auto-promote runs at most once per calendar day per user. Uses each card's
  // queued_at as last-reviewed timestamp and the same per-card spacing rule as
  // manual promote, so it can't compress intervals.
  if(!CU)return;
  const todayKey=new Date().toDateString();
  const lastKey=`mufradat-last-autopromote-${CU.username}`;
  try{if(localStorage.getItem(lastKey)===todayKey)return;}catch(e){}

  const queueMap={"L1Q":"L1","L2H":"L2Q","L3Q":"L3","L4Q":"L4","L5H":"L5Q"};
  const words=bw();
  const now=Date.now();
  let count=0;
  Object.entries(queueMap).forEach(([from,to])=>{
    words.filter(w=>w.leitnerLevel===from&&w.nextReview<=now).forEach(w=>{
      const lastReviewedAt=prog[w.id]?.queuedAt||now;
      prog[w.id]={leitnerLevel:to,nextReview:promotedNextReview(to,lastReviewedAt),queuedAt:lastReviewedAt};
      count++;
    });
  });

  try{localStorage.setItem(lastKey,todayKey);}catch(e){}
  if(count){
    saveProgressToDB();
    // Silent — the user asked for hands-off. They can see results in Levels view.
  }
}

async function promoteAllQueues(){
  const queueMap={"L1Q":"L1","L2H":"L2Q","L3Q":"L3","L4Q":"L4","L5H":"L5Q"};
  const words=bw();
  const nowTs=Date.now();
  let count=0;
  Object.entries(queueMap).forEach(([from,to])=>{
    words.filter(w=>w.leitnerLevel===from).forEach(w=>{
      const lastReviewedAt=prog[w.id]?.queuedAt||nowTs;
      prog[w.id]={leitnerLevel:to,nextReview:promotedNextReview(to,lastReviewedAt),queuedAt:lastReviewedAt};
      count++;
    });
  });
  if(!count){toast("No words in queues","#C49E3C");return;}
  await saveProgressToDB();
  toast(`${count} word${count!==1?"s":""} promoted from all queues ✓`);
  R();
}
function togglePromotePanel(queueId){
  if(promoteOpenQueue===queueId){
    promoteOpenQueue=null;
    promoteSelectedDates.clear();
  }else{
    promoteOpenQueue=queueId;
    // Default: nothing checked — user explicitly picks dates to promote
    promoteSelectedDates=new Set();
  }
  R();
}
function togglePromoteDate(date){
  if(promoteSelectedDates.has(date))promoteSelectedDates.delete(date);
  else promoteSelectedDates.add(date);
  R();
}
function promoteSelectAllDates(queueId){
  const dates=Object.keys(groupQueueByDate(queueId));
  promoteSelectedDates=new Set(dates);
  R();
}
function promoteClearDates(){
  promoteSelectedDates.clear();
  R();
}
async function promoteSelectedDatesNow(fromLevel,toLevel){
  if(!promoteSelectedDates.size){toast("Pick at least one date","#C49E3C");return;}
  const words=bw().filter(w=>w.leitnerLevel===fromLevel);
  const toPromote=words.filter(w=>promoteSelectedDates.has(queueDateKey(prog[w.id]?.queuedAt)));
  if(!toPromote.length){toast("No words match those dates","#C49E3C");return;}
  const nowTs=Date.now();
  toPromote.forEach(w=>{
    const lastReviewedAt=prog[w.id]?.queuedAt||nowTs;
    prog[w.id]={leitnerLevel:toLevel,nextReview:promotedNextReview(toLevel,lastReviewedAt),queuedAt:lastReviewedAt};
  });
  await saveProgressToDB();
  const lv=lvi(toLevel);
  toast(`${toPromote.length} word${toPromote.length!==1?"s":""} promoted to ${lv.l} ✓`);
  promoteOpenQueue=null;
  promoteSelectedDates.clear();

async function generateBulkCards(){

  if(!text){toast("Please enter some words first","#C04848");return;}
  const apiKey=(gLS(`mufradat-apikey-${CU.username}`)||'').replace(/^["']|["']$/g,'');
  if(!apiKey){toast("No API key. Add it in Settings.","#C04848");return;}
  const btn=document.getElementById("bulk-btn");
  if(btn){btn.innerHTML=`<span class="spinner"></span>Generating cards…`;btn.disabled=true;}

  const prompt=`You are an expert Arabic linguist. Generate flashcard data for the following word list.

Default dialect: ${dialect}
The user may prefix lines with a dialect override like "these are Darija:" — respect that for all following words until another override.

Rules:
- For NOUNS: include the singular with full diacritics, then " · " then the plural with full diacritics in the arabic field. English should be "singular meaning, plural meaning" if they differ, otherwise just the meaning.
- For VERBS: include past tense (ماضي) · present tense (مضارع) · masdar (مصدر) all with full diacritics separated by " · " in the arabic field. English should be "to [verb]".
- For all other word types: just the word with full diacritics.
- Always include full tashkeel (diacritics) on ALL Arabic text.
- Include a natural example sentence in Arabic with English translation in parentheses.
- Detect whether the input word is Arabic or English and generate the other side accordingly.
- wordType must be one of: Noun, Verb, Adjective, Adverb, Phrase, Preposition, Conjunction, Other
- dialect must be one of: MSA, Darija, Shaami, Egyptian, Gulf, Other

Word list:
${text}

Return ONLY a valid JSON array, no markdown, no explanation. Each object:
{
  "arabic": "...",
  "english": "...",
  "example": "...",
  "wordType": "...",
  "dialect": "..."
}`;

  try{
    const res=await fetch("https://tiny-sound-c8ff.jmorgansmith03.workers.dev",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:16000,

}

function confirmBulkCards(){
  if(!bulkCards.length){toast("No cards to add — generate some first","#C49E3C");return;}
  const tl=document.getElementById("bulk-target-level")?.value||"L1Q";
  const ex=new Set([...SU.map(w=>normArabic(w.arabic)),...uw.map(w=>normArabic(w.arabic))]);
  const toAdd=[];
  const skipped=[];
  bulkCards.forEach(c=>{
    if(!c.arabic||!c.arabic.trim()){skipped.push({arabic:c.arabic||"(empty)",reason:"empty"});return;}
    const n=normArabic(c.arabic);
    if(ex.has(n)){skipped.push({arabic:c.arabic,normalized:n,reason:"duplicate"});return;}
    toAdd.push(c);
  });
  console.log(`[bulk add] generated ${bulkCards.length}, adding ${toAdd.length}, skipping ${skipped.length}`);
  if(skipped.length)console.log("[bulk add] skipped:",skipped);
  if(toAdd.length)console.log("[bulk add] adding:",toAdd.map(c=>c.arabic));
  toAdd.forEach(w=>{w.leitnerLevel=tl;w.nextReview=nrf(tl)||Date.now();});
  uw.push(...toAdd);saveUW();
  toAdd.forEach(w=>{prog[w.id]={leitnerLevel:tl,nextReview:nrf(tl)||Date.now(),queuedAt:Date.now()};});
  deduplicateWords();
  saveProgressToDB();
  const lv=LV.find(l=>l.id===tl);
  const tlName=lv?lv.l:tl;
  let msg,color;
  if(toAdd.length===0&&skipped.length>0){
    msg=`0 added — all ${skipped.length} already in your deck`;color="#C49E3C";
  }else if(skipped.length>0){
    msg=`${toAdd.length} added to ${tlName} · ${skipped.length} skipped (duplicates)`;
  }else{
    msg=`${toAdd.length} card${toAdd.length!==1?"s":""} added to ${tlName} ✓`;
  }
  toast(msg,color);
  bulkCards=[];
  bulkExpanded.clear();
  V("home");
}

function SA(aa){
  const ar=document.getElementById("fa")?.value||"",en=document.getElementById("fen")?.value||"";
  let ok=true;
  document.getElementById("ea").style.display=ar.trim()?"none":"block";if(!ar.trim())ok=false;
  document.getElementById("een").style.display=en.trim()?"none":"block";if(!en.trim())ok=false;
  if(!ok)return;
  const tl=document.getElementById("fl")?.value||"L1Q";
  const w={id:uid(),arabic:ar.trim(),english:en.trim(),example:document.getElementById("fe")?.value||"",
    wordType:document.getElementById("ft")?.value||"Noun",dialect:document.getElementById("fd")?.value||"MSA",
    leitnerLevel:tl,nextReview:nrf(tl)||Date.now(),createdAt:Date.now()};
  // Check for duplicate (tashkeel-insensitive)
  const wNorm=normArabic(w.arabic);
  const dupCheck=bw().find(x=>normArabic(x.arabic)===wNorm);

  uw.push(w);saveUW();prog[w.id]={leitnerLevel:tl,nextReview:nrf(tl)||Date.now(),queuedAt:Date.now()};saveProgressToDB();
  const lv=LV.find(l=>l.id===tl);
  toast(`Word added to ${lv?lv.l:tl} ✓`);
  if(aa)R();else V("home");
}

// ── BONUS SESSION (drilling mastered words, no level changes) ──
function bonusStars(p){
  // Cumulative net correct over bonus sessions, capped at 3 stars
  const net=(p?.bonusCorrect||0)-(p?.bonusWrong||0);
  if(net>=10)return 3;
  if(net>=5)return 2;
  if(net>=2)return 1;
  return 0;
}
function pickBonusWords(count){
  const mastered=bw().filter(w=>w.leitnerLevel==="M");
  if(!mastered.length)return [];
  // Bring never-bonused words to the front, then oldest-bonused
  const never=mastered.filter(w=>!prog[w.id]?.bonusReviewedAt);
  const been=mastered.filter(w=>prog[w.id]?.bonusReviewedAt);
  // Fisher-Yates shuffle the never group
  for(let i=never.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[never[i],never[j]]=[never[j],never[i]];}
  // Sort the been group oldest-first
  been.sort((a,b)=>(prog[a.id]?.bonusReviewedAt||0)-(prog[b.id]?.bonusReviewedAt||0));
  return [...never,...been].slice(0,count);
}
function startBonusSession(){
  const countSel=document.getElementById("bonus-count");
  const dirSel=document.getElementById("bonus-dir");
  const requested=countSel?countSel.value:"50";
  bRd=dirSel?dirSel.value:"ar-en";
  const masteredTotal=bw().filter(w=>w.leitnerLevel==="M").length;
  const count=requested==="all"?masteredTotal:Math.min(parseInt(requested,10),masteredTotal);
  const picked=pickBonusWords(count);
  if(!picked.length){toast("No mastered words yet — keep reviewing!","#C49E3C");return;}
  bRq=picked;bRi=0;bFl=false;bRr=[];
  V("bonus");
}
function gradeBonusCard(correct){
  const card=bRq[bRi];if(!card)return;
  const cur=prog[card.id]||{leitnerLevel:"M",nextReview:Date.now()};
  prog[card.id]={
    ...cur,
    bonusReviewedAt:Date.now(),
    bonusCorrect:(cur.bonusCorrect||0)+(correct?1:0),
    bonusWrong:(cur.bonusWrong||0)+(correct?0:1)
  };
  bRr.push(correct?"right":"wrong");
  bFl=false;
  if(bRi+1>=bRq.length){
    saveProgressToDB();
    V("bonus-done");
  }else{
    bRi++;
    saveProgressToDB(); // mid-session save (matches existing review behavior)
    R();
  }
}
function endBonusSession(){
  if(bRr.length<bRq.length&&bRi>0){
    if(!confirm("End the session early? Your progress so far will be saved."))return;
  }
  saveProgressToDB();
  V("home");
}

// Transliteration map for English -> Arabic root conversion
const TRANSLIT = {
  'a':'ا','b':'ب','t':'ت','th':'ث','j':'ج','h':'ح','kh':'خ','d':'د',
  'dh':'ذ','r':'ر','z':'ز','s':'س','sh':'ش','S':'ص','D':'ض','T':'ط',
  'Z':'ظ','3':'ع','gh':'غ','f':'ف','q':'ق','k':'ك','l':'ل','m':'م',
  'n':'ن','w':'و','y':'ي','H':'ه','e':'ع','g':'غ','p':'ف','c':'ك',
  'x':'خ','i':'ي','u':'و','aa':'ا','ee':'ي','oo':'و'
};

function translitToArabic(input){
  let result='';
  let i=0;
  const s=input.toLowerCase().replace(/[-\s]/g,'');
  while(i<s.length){
    if(i+1<s.length&&TRANSLIT[s[i]+s[i+1]]){
      result+=TRANSLIT[s[i]+s[i+1]];i+=2;
    } else if(TRANSLIT[s[i]]){
      result+=TRANSLIT[s[i]];i++;
    } else {
      result+=s[i];i++;
    }
  }
  return result;
}

function handleTranslit(val){
  if(!val.trim())return;
  const arabic=translitToArabic(val);
  const arInput=document.getElementById('root-ar');
  if(arInput)arInput.value=arabic;
  rootInput=arabic;
}

      // Extract JSON more robustly
      let jsonStr = raw.replace(/```json|```/g,'').trim();
      const firstBrace = jsonStr.indexOf('{');
      const lastBrace = jsonStr.lastIndexOf('}');
      if(firstBrace !== -1 && lastBrace !== -1){
        jsonStr = jsonStr.slice(firstBrace, lastBrace+1);

  R();

// ── ARABIC ROOT MATCHING ──
// Strip common attached pronouns/prepositions to find base word
function arabicRootMatch(token, wordList){
  const clean = token.replace(/[،؟!.,ً-ٟ]/g,""); // strip punctuation and tashkeel
  if(!clean) return null;
  
  // Check exact match first (ignoring tashkeel)
  const stripTashkeel = s => s.replace(/[ً-ٟ]/g,"");
  const cleanStripped = stripTashkeel(clean);
  
  const exact = wordList.find(w => stripTashkeel(w.arabic.split(" · ")[0]) === cleanStripped);
  if(exact) return exact;
  
  // Common suffixes to strip (possessive pronouns, object pronouns, etc.)
  const suffixes = [
    "هُمْ","هُنَّ","كُمْ","كُنَّ","هَا","هُ","هِ","كَ","كِ","نَا","نِي","يَ","ي",
    "هم","هن","كم","كن","ها","هو","ك","نا","ني","ي",
    "تَانِ","تَيْنِ","انِ","يْنِ","ونَ","ينَ","اتٌ","اتٍ","اتِ",
  ];
  
  // Common prefixes to strip
  const prefixes = ["وَ","فَ","بِ","لِ","كَ","وَال","فَال","بِال","لِل","ال","وَ","فَ"];
  
  let base = cleanStripped;
  
  // Try stripping prefixes
  for(const pre of prefixes){
    const preStripped = stripTashkeel(pre);
    if(base.startsWith(preStripped) && base.length > preStripped.length + 1){
      const candidate = base.slice(preStripped.length);
      const found = wordList.find(w => stripTashkeel(w.arabic.split(" · ")[0]) === candidate);
      if(found) return found;
    }
  }
  
  // Try stripping suffixes
  for(const suf of suffixes){
    const sufStripped = stripTashkeel(suf);
    if(base.endsWith(sufStripped) && base.length > sufStripped.length + 1){
      const candidate = base.slice(0, base.length - sufStripped.length);
      const found = wordList.find(w => stripTashkeel(w.arabic.split(" · ")[0]) === candidate);
      if(found) return found;
      // Also try with ٌ ٍ ً endings on the candidate
      const foundTan = wordList.find(w => {
        const ws = stripTashkeel(w.arabic.split(" · ")[0]);
        return ws === candidate+"ن" || ws.slice(0,-1) === candidate;
      });
      if(foundTan) return foundTan;
    }
  }
  
  return null;
}

  }

  const resultHtml=applyResult?`
    <div style="margin-top:20px">
      ${sh("Generated Text")}
      <div style="background:#0C1B30;border:1px solid rgba(196,158,60,0.22);border-radius:16px;padding:22px;margin-bottom:14px">
        <div style="font-family:'Noto Naskh Arabic',serif;direction:rtl;font-size:20px;line-height:2.4;color:#EDE0C6;text-align:right">${renderApplyText(applyResult.text)}</div>
      </div>
      <div style="font-size:11px;color:#667788;margin-bottom:12px">Tap any word to add it to your vocabulary.</div>
      <button class="btn2" style="width:100%;text-align:center" onclick="applyResult=null;R()">← Generate Another</button>
    </div>`:"";

  return`<div style="font-family:'Noto Naskh Arabic',serif;direction:rtl;font-size:26px;color:#C49E3C;text-align:right;margin-bottom:6px">مُطَبَّقٌ</div>
  <div style="font-size:12px;color:#667788;margin-bottom:18px">Practice your Arabic in context.</div>
  ${modeCards}
  ${dialectSelect}
  ${modeContent}
  ${resultHtml}`;
}

let applyPopup=null;

function renderApplyText(text){
  const words=bw();
  return text.split(/\s+/).map(token=>{
    if(!token.trim())return " ";
    const clean=token.replace(/[،؟!.,]/g,"");
    if(!clean)return token;
    const matched=arabicRootMatch(clean, words);
    const isMastered=matched&&matched.leitnerLevel==="M";
    const isKnown=!!matched;
    const color=isMastered?"#EDE0C6":isKnown?"#7BC8E8":"#5AABDE";
    const underline=isMastered?"none":"1px dashed rgba(90,171,222,0.5)";
    return `<span onclick="showWordPopup('${clean.replace(/'/g,"\'")}',event)" style="cursor:pointer;color:${color};border-bottom:${underline};padding:0 2px;margin:0 1px;display:inline-block">${token}</span>`;
  }).join(" ");
}

function showWordPopup(word, e){
  if(!word||!word.trim())return;
  // Remove existing popup
  const old=document.getElementById("word-popup");
  if(old){old.remove();if(applyPopup===word){applyPopup=null;return;}}
  applyPopup=word;
  const words=bw();
  const existing=arabicRootMatch(word, words);
  // Create popup
  const popup=document.createElement("div");
  popup.id="word-popup";
  popup.style.cssText="position:fixed;z-index:300;background:#0C1B30;border:1px solid rgba(196,158,60,0.4);border-radius:12px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.7);min-width:200px;max-width:280px";
  // Position near tap
  const x=Math.min(e.clientX, window.innerWidth-290);
  const y=e.clientY+20;
  popup.style.left=Math.max(10,x)+"px";
  popup.style.top=Math.min(y, window.innerHeight-140)+"px";
  if(existing){
    popup.innerHTML=`<div style="font-family:'Noto Naskh Arabic',serif;direction:rtl;font-size:20px;color:#EDD98A;margin-bottom:6px">${word}</div>
      <div style="font-size:12px;color:#3A9864;margin-bottom:10px">Already in ${lvi(existing.leitnerLevel).l}</div>
      <button onclick="document.getElementById('word-popup').remove();applyPopup=null" style="background:none;border:1px solid rgba(196,158,60,0.3);border-radius:8px;padding:6px 14px;color:#667788;cursor:pointer;font-family:inherit;font-size:12px">Close</button>`;
  } else {
    popup.innerHTML=`<div style="font-family:'Noto Naskh Arabic',serif;direction:rtl;font-size:20px;color:#EDD98A;margin-bottom:10px">${word}</div>
      <div style="display:flex;gap:8px">
        <button onclick="addWordFromApply('${word.replace(/'/g,"\'")}','L1Q');document.getElementById('word-popup').remove();applyPopup=null" style="flex:1;background:rgba(192,72,72,0.15);border:1px solid rgba(192,72,72,0.4);border-radius:8px;padding:8px 6px;color:#C04848;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">+ L1 Queue</button>
        <button onclick="addWordFromApply('${word.replace(/'/g,"\'")}','M');document.getElementById('word-popup').remove();applyPopup=null" style="flex:1;background:rgba(58,152,100,0.15);border:1px solid rgba(58,152,100,0.4);border-radius:8px;padding:8px 6px;color:#3A9864;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">+ Mastered</button>
      </div>`;
  }
  document.body.appendChild(popup);
  // Close on outside tap
  setTimeout(()=>{
    document.addEventListener("click",function handler(ev){
      if(!popup.contains(ev.target)){popup.remove();applyPopup=null;document.removeEventListener("click",handler);}
    });
  },100);
}

async function addWordFromApply(word, level){
  const apiKey=(gLS(`mufradat-apikey-${CU.username}`)||'').replace(/^["']|["']$/g,'');
  const lv=LV.find(l=>l.id===level);
  toast('Generating card for "'+word+'"…','#C49E3C');

  let arabic=word, english="", example="", wordType="Noun";

  if(apiKey){
    try{
      const prompt=`You are an Arabic linguist. Generate a flashcard for this Arabic word: ${word}
Return ONLY valid JSON (no markdown, no newlines inside strings):
{"arabic":"${word} with full tashkeel","english":"English meaning","example":"Example sentence in Arabic with full tashkeel (English translation in parentheses)","wordType":"Noun or Verb or Adjective or Adverb or Phrase or Conjunction or Preposition or Other","dialect":"${applyDialect}"}`;
      const res=await fetch("https://tiny-sound-c8ff.jmorgansmith03.workers.dev",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(!data.error){
        const raw=data.content?.map(c=>c.text||"").join("")||"";
        let jsonStr=raw.replace(/```json|```/g,"").trim();
        const fb=jsonStr.indexOf("{"),lb=jsonStr.lastIndexOf("}");
        if(fb!==-1&&lb!==-1)jsonStr=jsonStr.slice(fb,lb+1);
        jsonStr=jsonStr.split("\n").join(" ").split("\r").join(" ");
        const parsed=JSON.parse(jsonStr);
        arabic=parsed.arabic||word;
        english=parsed.english||"";
        example=parsed.example||"";
        wordType=parsed.wordType||"Noun";
      }
    }catch(e){console.warn("Card gen failed:",e);}
  }

  const w={id:uid(),arabic,english,example,wordType,dialect:applyDialect,leitnerLevel:level,nextReview:nrf(level)||Date.now(),createdAt:Date.now()};
  uw.push(w);saveUW();prog[w.id]={leitnerLevel:level,nextReview:nrf(level)||Date.now(),queuedAt:Date.now()};saveProgressToDB();
  toast('"'+word+'" added to '+(lv?lv.l:level)+' ✓');
  R();
}

async function generateApply(){
  if(!navigator.onLine){toast("Apply tab needs a connection","#C49E3C");return;}
  const apiKey=(gLS(`mufradat-apikey-${CU.username}`)||'').replace(/^["']|["']$/g,'');
  if(!apiKey){toast("No API key","#C04848");return;}
  const btn=document.getElementById("apply-btn");
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Generating...';}
  const words=bw();
  const mastered=words.filter(w=>w.leitnerLevel==="M").map(w=>w.arabic);
  const all=words.map(w=>w.arabic);
  let prompt="";
  if(applyMode==="reading"){
    prompt=`You are an expert Arabic teacher. Write a natural engaging paragraph in ${applyDialect==="MSA"?"Modern Standard Arabic (فصحى)":applyDialect+" dialect"}.
Rules:
- Write 5-8 sentences
- Use as many of these words naturally as possible: ${mastered.slice(0,40).join(" ،")}
- Fill gaps with appropriate high-frequency Arabic words  
- Full diacritics (tashkeel) on every single word
- No English translation - immersion mode
- Make it interesting: a story, scene, or reflection
Return ONLY valid JSON: {"text":"...paragraph..."}`;
  } else {
    const s=GRAMMAR_STRUCTURES.find(g=>g.id===applyStructure);
    prompt=`You are an expert Arabic teacher. Write a short paragraph in ${applyDialect==="MSA"?"Modern Standard Arabic (فصحى)":applyDialect+" dialect"} that heavily drills: ${s?s.en:""} (${s?s.ar:""}).
Rules:
- Write 5-7 sentences each demonstrating the target structure
- Use some of these vocabulary words: ${all.slice(0,30).join(" ،")}
- Full diacritics (tashkeel) on every single word
- No English translation
- Be natural and coherent
Return ONLY valid JSON: {"text":"...paragraph..."}`;
  }
  try{
    const res=await fetch("https://tiny-sound-c8ff.jmorgansmith03.workers.dev",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    if(data.error){toast(data.error.message||"API error","#C04848");}
    else{
      const raw=data.content?.map(c=>c.text||"").join("")||"";
      let jsonStr=raw.replace(/```json|```/g,"").trim();
      const fb=jsonStr.indexOf("{"),lb=jsonStr.lastIndexOf("}");
      if(fb!==-1&&lb!==-1)jsonStr=jsonStr.slice(fb,lb+1);
      jsonStr=jsonStr.split("\n").join(" ").split("\r").join(" ");
      try{
        const parsed=JSON.parse(jsonStr);
        applyResult={text:parsed.text};
      }catch(pe){toast("Parse error — try again","#C04848");}
    }
  }catch(e){toast("Failed: "+e.message,"#C04848");}
  if(btn){btn.disabled=false;btn.innerHTML=applyMode==="reading"?"📖 Generate Paragraph":"⚙️ Generate Sentences";}
  R();
}

function saveTarget(){const v=parseInt(document.getElementById("wt-input")?.value)||60;wt=v;sLS("mufradat-target",wt);toast("Target saved ✓");}

// ── BOOT ──
(async function(){
  const t=gLS("mufradat-target");if(t)wt=parseInt(t)||60;
  const session=gLS("mufradat-session");
  if(session&&session.id&&session.username){
    CU=session;loadUW();
    SU.forEach(w=>{const id=sid(w.arabic);if(!prog[id])prog[id]={leitnerLevel:"L1",nextReview:Date.now()};});
    await flushPendingDeletes();
    await loadProgressFromDB();
    cam();await saveProgressToDB();el=delDue();view="home";
  }
  R();
  // Safety net: best-effort sync on tab close. Uses fetch+keepalive so we can
  // send the auth headers Supabase requires (sendBeacon can't set them).
  function flushOnExit(){
    if(!CU)return;
    const headers={"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates,return=minimal"};
    if(uw.length){
      const wordRows=uw.map(w=>({user_id:CU.id,word_id:w.id,arabic:w.arabic,english:w.english,example:w.example||"",word_type:w.wordType||"Noun",dialect:w.dialect||"MSA",created_at:w.createdAt?new Date(w.createdAt).toISOString():new Date().toISOString()}));
      try{fetch(`${SB_URL}/rest/v1/user_words?on_conflict=user_id,word_id`,{method:"POST",headers,body:JSON.stringify(wordRows),keepalive:true}).catch(()=>{});}catch(e){}
    }
    if(Object.keys(prog).length){
      const rows=Object.entries(prog).map(([word_id,v])=>({user_id:CU.id,word_id,leitner_level:v.leitnerLevel,next_review:v.nextReview,queued_at:v.queuedAt?new Date(v.queuedAt).toISOString():null,bonus_reviewed_at:v.bonusReviewedAt?new Date(v.bonusReviewedAt).toISOString():null,bonus_correct:v.bonusCorrect||0,bonus_wrong:v.bonusWrong||0,updated_at:new Date().toISOString()}));
      try{fetch(`${SB_URL}/rest/v1/progress?on_conflict=user_id,word_id`,{method:"POST",headers,body:JSON.stringify(rows),keepalive:true}).catch(()=>{});}catch(e){}
    }
  }
  window.addEventListener("beforeunload",flushOnExit);
  // Mobile browsers often skip beforeunload — visibilitychange is more reliable
  document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")flushOnExit();});
  window.addEventListener("pagehide",flushOnExit);

  // Online/offline: re-sync when we come back online, re-render so the offline indicator updates
  window.addEventListener("online",async()=>{
    setSyncDot(false);
    if(CU){
      try{await flushPendingDeletes();}catch(e){}
      saveProgressToDB();
    }
    R();
  });
  window.addEventListener("offline",()=>{setSyncDot(false);R();});

  // Service worker registration — caches assets for offline boot
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
      navigator.serviceWorker.register("/sw.js").catch(e=>console.warn("SW registration failed",e));
    });
  }
})();
