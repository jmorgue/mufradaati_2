async function sbFetch(path,opts={}){
  const res=await fetch(`${SB_URL}/rest/v1${path}`,{...opts,headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":opts.prefer||"return=representation",...(opts.headers||{})}});
  const text=await res.text();
  const body=text?JSON.parse(text):null;
  if(!res.ok)throw new Error((body&&(body.message||body.details))||res.statusText);
  return body;
}
const sbGet=p=>sbFetch(p,{method:"GET",prefer:""});
const sbPost=(p,b)=>sbFetch(p,{method:"POST",body:JSON.stringify(b)});

async function hashPin(pin){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// Level order from lowest to highest
const LEVEL_ORDER = ["L1Q","L1","L2H","L2Q","L3Q","L3","L4Q","L4","L5H","L5Q","M"];
function levelRank(id){return LEVEL_ORDER.indexOf(id);}

function deduplicateWords(){
  // Find duplicates in user words by arabic text
  const seen = {}; // arabic -> [word, ...]
  uw.forEach(w=>{
    const key=w.arabic.trim();
    if(!seen[key])seen[key]=[];
    seen[key].push(w);
  });
  let changed=false;
  Object.values(seen).forEach(group=>{
    if(group.length<=1)return;
    // Find the one at the highest level
    group.sort((a,b)=>{
      const la=prog[a.id]?.leitnerLevel||a.leitnerLevel||"L1Q";
      const lb=prog[b.id]?.leitnerLevel||b.leitnerLevel||"L1Q";
      return levelRank(lb)-levelRank(la);
    });
    // Keep first (highest), delete rest
    const toDelete=group.slice(1);
    toDelete.forEach(w=>{
      uw=uw.filter(x=>x.id!==w.id);
      delete prog[w.id];
    });
    changed=true;
  });
  if(changed){saveUW();scheduleSync();}
}

function nrf(id){
  const now=new Date();now.setHours(0,0,0,0);const D=86400000;
  if(id==="L1"||id==="L1Q"||id==="L2H")return now.getTime()+D;
  if(id==="L2Q")return now.getTime()+2*D;
  if(id==="L3Q"||id==="L3"){for(let i=1;i<=7;i++){const nd=(now.getDay()+i)%7;if(nd===0||nd===3)return now.getTime()+i*D;}}
  if(id==="L4Q"||id==="L4"){const d=now.getDay();return now.getTime()+(d===0?7:7-d)*D;}
  if(id==="L5H")return now.getTime()+7*D;
  if(id==="L5Q")return now.getTime()+14*D;
  return null;
}

function cam(){
  const words=bw();const np={...prog};let ch=false;const now=Date.now();const td=new Date().getDay();
  words.filter(w=>w.leitnerLevel==="L1Q"&&w.nextReview<=now).forEach(w=>{np[w.id]={leitnerLevel:"L1",nextReview:now};ch=true;});
  words.filter(w=>w.leitnerLevel==="L2H"&&w.nextReview<=now).forEach(w=>{np[w.id]={leitnerLevel:"L2Q",nextReview:now};ch=true;});
  words.filter(w=>w.leitnerLevel==="L5H"&&w.nextReview<=now).forEach(w=>{np[w.id]={leitnerLevel:"L5Q",nextReview:now};ch=true;});
  if(td===0||td===3)words.filter(w=>w.leitnerLevel==="L3Q"&&w.nextReview<=now).forEach(w=>{np[w.id]={leitnerLevel:"L3",nextReview:now};ch=true;});
  if(td===0)words.filter(w=>w.leitnerLevel==="L4Q"&&w.nextReview<=now).forEach(w=>{np[w.id]={leitnerLevel:"L4",nextReview:now};ch=true;});
  if(ch){prog=np;scheduleSync();}
}
function delDue(){
  const words=bw();const day=new Date().getDay();const hd=id=>words.some(w=>w.leitnerLevel===id&&isDue(w));

}

async function doAuthLogin(){

  const p=(document.getElementById("ap")?.value||"").trim();
  const err=document.getElementById("auth-err");const btn=document.getElementById("auth-btn");

  btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Signing in…`;
  try{

    if(!res.ok){err.textContent=res.error;btn.disabled=false;btn.innerHTML="Sign In →";return;}
    CU=res.user;sLS("mufradat-session",CU);
    loadUW();

    deduplicateWords();cam();el=delDue();view="home";R();
    toast(`مرحباً ${CU.username}! ✓`);
  }catch(e){err.textContent=e.message;btn.disabled=false;btn.innerHTML="Sign In →";}
}

async function doAuthRegister(){
  const u=(document.getElementById("au")?.value||"").trim().toLowerCase();
  const p=(document.getElementById("ap")?.value||"").trim();
  const ak=(document.getElementById("ak")?.value||"").trim();
  const err=document.getElementById("auth-err");const btn=document.getElementById("auth-btn");
  if(!u||p.length<4){err.textContent="Username required and PIN must be 4+ digits.";return;}
  if(!/^\d+$/.test(p)){err.textContent="PIN must be digits only.";return;}
  btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Creating account…`;
  try{
    const res=await registerUser(u,p);
    if(!res.ok){err.textContent=res.error;btn.disabled=false;btn.innerHTML="Create Account →";return;}
    CU=res.user;
    if(ak)sLS(`mufradat-apikey-${u}`,ak);
    sLS("mufradat-session",CU);
    loadUW();
    SU.forEach(w=>{const id=sid(w.arabic);if(!prog[id])prog[id]={leitnerLevel:"L1",nextReview:Date.now()};});

}

// Transliteration map for English -> Arabic root conversion
const TRANSLIT = {
  'a':'ا','b':'ب','t':'ت','th':'ث','j':'ج','h':'ح','kh':'خ','d':'د',
  'dh':'ذ','r':'ر','z':'ز','s':'س','sh':'ش','S':'ص','D':'ض','T':'ط',
  'Z':'ظ','3':'ع','gh':'غ','f':'ف','q':'ق','k':'ك','l':'ل','m':'م',
  'n':'ن','w':'و','y':'ي','H':'ه','e':'ع','g':'غ','p':'ف','c':'ك',
  'x':'خ','i':'ي','u':'و','aa':'ا','ee':'ي','oo':'و'
};

function translitToArabic(input){
  let result='';
  let i=0;
  const s=input.toLowerCase().replace(/[-\s]/g,'');
  while(i<s.length){
    if(i+1<s.length&&TRANSLIT[s[i]+s[i+1]]){
      result+=TRANSLIT[s[i]+s[i+1]];i+=2;
    } else if(TRANSLIT[s[i]]){
      result+=TRANSLIT[s[i]];i++;
    } else {
      result+=s[i];i++;
    }
  }
  return result;
}

    if(!tabContent) tabContent='<div style="color:#667788;text-align:center;padding:40px 0">No verb forms found for this root.</div>';

    if(!tabContent) tabContent='<div style="color:#667788;text-align:center;padding:40px 0">No derived nouns found for this root.</div>';

    if(!tabContent) tabContent='<div style="color:#667788;text-align:center;padding:40px 0">No expressions found for this root.</div>';
  }

  return`${searchBox}
  ${sh('Results — Root: '+rootResults.root)}
  ${tabs}

let applyPopup=null;

function renderApplyText(text){
  const words=bw();
  const masteredSet=new Set(words.filter(w=>w.leitnerLevel==="M").map(w=>w.arabic));
  const allSet=new Set(words.map(w=>w.arabic));
  return text.split(/\s+/).map(token=>{
    if(!token.trim())return " ";
    const clean=token.replace(/[،؟!.,]/g,"");
    if(!clean)return token;
    const isMastered=masteredSet.has(clean);
    const isKnown=allSet.has(clean);
    const color=isMastered?"#EDE0C6":isKnown?"#7BC8E8":"#5AABDE";
    const underline=isMastered?"none":"1px dashed rgba(90,171,222,0.5)";
    return `<span onclick="showWordPopup('${clean.replace(/'/g,"\'")}',event)" style="cursor:pointer;color:${color};border-bottom:${underline};padding:0 2px;margin:0 1px;display:inline-block">${token}</span>`;
  }).join(" ");
}

function showWordPopup(word, e){
  if(!word||!word.trim())return;
  // Remove existing popup
  const old=document.getElementById("word-popup");
  if(old){old.remove();if(applyPopup===word){applyPopup=null;return;}}
  applyPopup=word;
  const words=bw();
  const existing=words.find(w=>w.arabic===word);
  // Create popup
  const popup=document.createElement("div");
  popup.id="word-popup";
  popup.style.cssText="position:fixed;z-index:300;background:#0C1B30;border:1px solid rgba(196,158,60,0.4);border-radius:12px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.7);min-width:200px;max-width:280px";
  // Position near tap
  const x=Math.min(e.clientX, window.innerWidth-290);
  const y=e.clientY+20;
  popup.style.left=Math.max(10,x)+"px";
  popup.style.top=Math.min(y, window.innerHeight-140)+"px";
  if(existing){
    popup.innerHTML=`<div style="font-family:'Noto Naskh Arabic',serif;direction:rtl;font-size:20px;color:#EDD98A;margin-bottom:6px">${word}</div>
      <div style="font-size:12px;color:#3A9864;margin-bottom:10px">Already in ${lvi(existing.leitnerLevel).l}</div>

  } else {

    document.addEventListener("click",function handler(ev){

      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    if(data.error){toast(data.error.message||"API error","#C04848");}
    else{
      const raw=data.content?.map(c=>c.text||"").join("")||"";
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      applyResult={text:parsed.text};
    }
  }catch(e){toast("Failed: "+e.message,"#C04848");}
  R();
}

// ── BOOT ──
(async function(){
  const t=gLS("mufradat-target");if(t)wt=parseInt(t)||60;
  const session=gLS("mufradat-session");
  if(session&&session.id&&session.username){
    CU=session;loadUW();
    SU.forEach(w=>{const id=sid(w.arabic);if(!prog[id])prog[id]={leitnerLevel:"L1",nextReview:Date.now()};});
    await loadProgressFromDB();
    cam();el=delDue();view="home";
  }
  R();
  // Safety net: best-effort sync on tab close
  window.addEventListener("beforeunload",()=>{
    if(!CU||!Object.keys(prog).length)return;
    const rows=Object.entries(prog).map(([word_id,v])=>({user_id:CU.id,word_id,leitner_level:v.leitnerLevel,next_review:v.nextReview,updated_at:new Date().toISOString()}));
    if(navigator.sendBeacon){
      navigator.sendBeacon(`${SB_URL}/rest/v1/progress`,new Blob([JSON.stringify(rows)],{type:"application/json"}));
    }
  });
})();
